<!--
  スマホのカメラでQRコードを読み取り、読み取った値をクエリパラメータに載せて
  Apps ScriptのURL(Code.gs)へページ全体を遷移させる、通常のHTMLページです。

  結果表示はApps Script側(HTMLページ)が行います。バックグラウンド通信(fetch/JSONP)
  にはしていません。このGoogleアカウントのWebアプリ公開設定が「Googleアカウントが
  必要」に限定されており、外部サイトからのバックグラウンド通信だとiOS SafariのITP
  (サードパーティCookieブロック)でログインCookieが送られず失敗するためです。
  ページ全体の遷移(通常のブラウザナビゲーション)であればこの制約を受けません。

  Apps ScriptのHtmlServiceで直接カメラを表示するとカメラ権限が働かないため、
  GitHub Pages / Firebase Hosting / Netlify などの通常のHTTPSホスティングに
  このファイル単体を配置してください。

  下の API_URL を、Apps Scriptをデプロイして発行された /exec のURLに置き換えてください。
-->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }
    h1 {
      font-size: 18px;
      margin: 8px 0 16px;
    }
    #reader-wrap {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 1 / 1;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #frame {
      position: absolute;
      inset: 12%;
      border: 3px solid #4caf50;
      border-radius: 12px;
      pointer-events: none;
    }
    #status {
      margin-top: 12px;
      font-size: 14px;
      color: #aaa;
      min-height: 20px;
      text-align: center;
    }
    button {
      margin-top: 12px;
      padding: 10px 20px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      background: #4caf50;
      color: #fff;
    }
    button:disabled { background: #555; }
    #manual {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 420px;
    }
    #manual input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1e1e1e;
      color: #eee;
      font-size: 15px;
      min-width: 0;
    }
    #manual button {
      margin-top: 0;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <h1>QRコード検索</h1>

  <div id="reader-wrap">
    <video id="video" playsinline muted></video>
    <div id="frame"></div>
  </div>
  <canvas id="canvas" style="display:none;"></canvas>

  <div id="status">カメラを起動しています…</div>

  <form id="manual">
    <input id="manualInput" type="text" placeholder="うまく読み取れない場合はコードを直接入力" autocapitalize="off" autocomplete="off">
    <button type="submit">検索</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    // Apps Scriptデプロイ後に発行される /exec のURLに置き換えてください
    const API_URL = 'https://script.google.com/macros/s/AKfycbyaI-tujmgbAVOnaS6JVYl3s-nE9eMGQG4sonzAItClZ1S_3SUlXqL1NyeuNjw_s4Ps/exec';

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const manualForm = document.getElementById('manual');
    const manualInput = document.getElementById('manualInput');

    let scanning = true;

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        });
        video.srcObject = stream;
        await video.play();
        statusEl.textContent = 'QRコードをかざしてください (' + video.videoWidth + 'x' + video.videoHeight + ')';
        requestAnimationFrame(tick);
      } catch (err) {
        statusEl.textContent = 'カメラを起動できませんでした: ' + err.message;
      }
    }

    function tick() {
      if (!scanning) return;

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, {
          inversionAttempts: 'attemptBoth'
        });

        if (code && code.data) {
          onScanned(code.data);
          return;
        }
      }
      requestAnimationFrame(tick);
    }

    function onScanned(value) {
      scanning = false;
      statusEl.textContent = '検索中: ' + value;
      // fetch/JSONPではなくページ全体を遷移させる(理由は先頭コメント参照)
      location.href = API_URL + '?key=' + encodeURIComponent(value);
    }

    manualForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const value = manualInput.value.trim();
      if (!value) return;
      onScanned(value);
    });

    startCamera();
  </script>
</body>
</html>
