<!--
  スマホのカメラでQRコードを読み取り、読み取った値でGoogleスプレッドシートを
  直接検索して、その場に結果を表示する単体のHTMLページです。

  経緯:
  以前はApps Script側で検索・表示を行い、読み取り後にページ全体をApps ScriptのURLへ
  遷移させる方式でした。しかしこのGoogleアカウント(Workspace)ではWebアプリの公開範囲を
  「全員(匿名可)」にできず「Googleアカウントを持つ全員」までしか選べないため、
  組織外のGoogleアカウント(同僚の別アカウントなど)だとログインが通らず失敗することが
  ありました。

  そこでApps Scriptをやめ、スプレッドシートを「リンクを知っている全員が閲覧可」に
  共有した上で、Googleスプレッドシートの公開クエリ機能(gviz/tq API)を
  <script>タグ経由(JSONP)でこのページから直接呼び出す方式にしました。
  <script>タグでの読み込みはCORSの制約を受けないため、ログイン不要・Apps Script不要で
  誰でもそのまま結果を見られます。

  下の設定(SPREADSHEET_ID など)を、あなたのスプレッドシートに合わせて書き換えてください。
-->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }
    h1 {
      font-size: 18px;
      margin: 8px 0 16px;
    }
    #reader-wrap {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 1 / 1;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #frame {
      position: absolute;
      inset: 12%;
      border: 3px solid #4caf50;
      border-radius: 12px;
      pointer-events: none;
    }
    #status {
      margin-top: 12px;
      font-size: 14px;
      color: #aaa;
      min-height: 20px;
      text-align: center;
    }
    button {
      margin-top: 12px;
      padding: 10px 20px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      background: #4caf50;
      color: #fff;
    }
    button:disabled { background: #555; }
    #manual {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 420px;
    }
    #manual input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1e1e1e;
      color: #eee;
      font-size: 15px;
      min-width: 0;
    }
    #manual button {
      margin-top: 0;
      white-space: nowrap;
    }
    #result-wrap {
      display: none;
      width: 100%;
      max-width: 420px;
    }
    #result {
      width: 100%;
      background: #1e1e1e;
      border-radius: 12px;
      padding: 16px;
      box-sizing: border-box;
    }
    #result table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    #result th, #result td {
      text-align: left;
      padding: 6px 8px;
      border-bottom: 1px solid #333;
      word-break: break-all;
    }
    #result th {
      color: #9e9e9e;
      width: 40%;
      font-weight: normal;
    }
    #result .notfound {
      color: #ff6b6b;
    }
    #rescan-button {
      width: 100%;
      max-width: 420px;
    }
  </style>
</head>
<body>
  <h1>Ms ROM管理</h1>

  <div id="reader-wrap">
    <video id="video" playsinline muted></video>
    <div id="frame"></div>
  </div>
  <canvas id="canvas" style="display:none;"></canvas>

  <div id="status">カメラを起動しています…</div>

  <form id="manual">
    <input id="manualInput" type="text" placeholder="うまく読み取れない場合はコードを直接入力" autocapitalize="off" autocomplete="off">
    <button type="submit">検索</button>
  </form>

  <div id="result-wrap">
    <div id="result"></div>
    <button id="rescan-button" type="button">もう一度スキャン</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    // ↓ 実際のスプレッドシートに合わせて書き換えてください ------------------------

    // スプレッドシートのURL(https://docs.google.com/spreadsheets/d/【ここ】/edit)の
    // /d/ と /edit の間の文字列
    const SPREADSHEET_ID = '17znko9c0YL-gaqFny9IPZnkqTY1GjgstcPBz-2qx8bc';

    // 検索対象のシート名
    const SHEET_NAME = '詳細';

    // 検索キーが入っている列のアルファベット(A列なら'A')
    const KEY_COLUMN = 'A';

    // 結果に表示しない列のヘッダー名(社外に見せたくない列など)
    const EXCLUDE_HEADERS = ['内部メモ'];

    // ---------------------------------------------------------------------------

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const manualForm = document.getElementById('manual');
    const manualInput = document.getElementById('manualInput');
    const resultWrap = document.getElementById('result-wrap');
    const resultEl = document.getElementById('result');
    const rescanButton = document.getElementById('rescan-button');

    let scanning = true;
    let pendingTimeout = null;

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        });
        video.srcObject = stream;
        await video.play();
        statusEl.textContent = 'QRコードをかざしてください (' + video.videoWidth + 'x' + video.videoHeight + ')';
        requestAnimationFrame(tick);
      } catch (err) {
        statusEl.textContent = 'カメラを起動できませんでした: ' + err.message;
      }
    }

    function tick() {
      if (!scanning) return;

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, {
          inversionAttempts: 'attemptBoth'
        });

        if (code && code.data) {
          onScanned(code.data);
          return;
        }
      }
      requestAnimationFrame(tick);
    }

    function onScanned(value) {
      scanning = false;
      lookup(value);
    }

    manualForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const value = manualInput.value.trim();
      if (!value) return;
      scanning = false;
      lookup(value);
    });

    rescanButton.addEventListener('click', () => {
      resultWrap.style.display = 'none';
      document.getElementById('reader-wrap').style.display = '';
      manualForm.style.display = '';
      manualInput.value = '';
      scanning = true;
      statusEl.textContent = 'QRコードをかざしてください';
      requestAnimationFrame(tick);
    });

    function lookup(key) {
      statusEl.textContent = '検索中: ' + key;
      document.getElementById('reader-wrap').style.display = 'none';
      manualForm.style.display = 'none';

      const escapedKey = key.replace(/'/g, "''");
      const tq = "select * where " + KEY_COLUMN + " = '" + escapedKey + "'";
      const params = new URLSearchParams({
        tqx: 'out:json;responseHandler:handleSheetResponse',
        sheet: SHEET_NAME,
        tq: tq
      });
      const url = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID +
        '/gviz/tq?' + params.toString();

      const old = document.getElementById('gviz-script');
      if (old) old.remove();

      clearTimeout(pendingTimeout);
      pendingTimeout = setTimeout(() => {
        showError('通信がタイムアウトしました。スプレッドシートの共有設定(リンクを知っている全員が閲覧可)を確認してください。');
      }, 10000);

      const script = document.createElement('script');
      script.id = 'gviz-script';
      script.src = url;
      script.onerror = () => showError('通信エラーが発生しました');
      document.body.appendChild(script);
    }

    function handleSheetResponse(response) {
      clearTimeout(pendingTimeout);

      try {
        if (!response || response.status === 'error') {
          const detail = response && response.errors
            ? response.errors.map((e) => e.detailed_message || e.message).join(' / ')
            : '不明なエラー';
          showError('検索に失敗しました: ' + detail);
          return;
        }

        const table = response.table;
        if (!table || !table.cols) {
          showError('スプレッドシートからの応答が想定と異なります。共有設定(リンクを知っている全員が閲覧可)とSPREADSHEET_ID/SHEET_NAMEを確認してください。');
          return;
        }

        const rows = table.rows;
        if (!rows || rows.length === 0) {
          showResult('<div class="notfound">該当するデータが見つかりませんでした</div>');
          return;
        }

        const row = rows[0];
        let html = '<table>';
        table.cols.forEach((col, idx) => {
          const header = col.label || col.id;
          if (EXCLUDE_HEADERS.includes(header)) return;
          const cell = row.c[idx];
          const value = cell ? (cell.f || cell.v || '') : '';
          html += '<tr><th>' + escapeHtml(header) + '</th><td>' + escapeHtml(String(value)) + '</td></tr>';
        });
        html += '</table>';
        showResult(html);
      } catch (err) {
        showError('結果の表示中にエラーが発生しました: ' + err.message);
      }
    }

    function showResult(html) {
      statusEl.textContent = '';
      resultEl.innerHTML = html;
      resultWrap.style.display = '';
    }

    function showError(message) {
      showResult('<div class="notfound">' + escapeHtml(message) + '</div>');
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    startCamera();
  </script>
</body>
</html>
